<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script>!function(){var p=location.pathname;if(!p.endsWith("/")&&!p.endsWith(".html"))document.write('<base href="'+p+'/">')}()</script>
  <title>Powerhouse Design System</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Poppins:wght@600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --sidebar-w: 260px;
      --bg: #FCFCFC;
      --bg-sidebar: #F5F5F7;
      --text: #141414;
      --text-muted: #6C7275;
      --border: #E0E0E0;
      --primary: #32373B;
      --primary-light: #E8EAEB;
      --hover: #EEEFF1;
      --active: #E4E5E9;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0E0E0D;
        --bg-sidebar: #0A0A09;
        --text: #FAFAFA;
        --text-muted: #8A8F98;
        --border: #2A2D33;
        --primary: #F3F5F7;
        --primary-light: #1A1D22;
        --hover: #1A1D22;
        --active: #2A2D33;
      }
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      overflow: hidden;
    }

    /* Sidebar */
    .sidebar {
      width: var(--sidebar-w);
      min-width: var(--sidebar-w);
      height: 100vh;
      background: var(--bg-sidebar);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      transition: margin-left 0.25s ease, min-width 0.25s ease, width 0.25s ease;
      overflow: hidden;
      z-index: 10;
    }

    .sidebar.collapsed {
      margin-left: calc(-1 * var(--sidebar-w));
      min-width: 0;
      width: 0;
    }

    .sidebar-header {
      padding: 20px 16px 12px;
      display: flex;
      align-items: center;
      gap: 12px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .sidebar-header img {
      height: 28px;
      flex-shrink: 0;
    }

    .sidebar-header .logo-light { display: block; }
    .sidebar-header .logo-dark { display: none; }

    @media (prefers-color-scheme: dark) {
      .sidebar-header .logo-light { display: none; }
      .sidebar-header .logo-dark { display: block; }
    }

    .sidebar-header h1 {
      font-size: 13px;
      font-weight: 600;
      letter-spacing: -0.01em;
      white-space: nowrap;
    }

    .sidebar-header h1 span {
      display: block;
      font-size: 11px;
      font-weight: 400;
      color: var(--text-muted);
      margin-top: 2px;
    }

    .sidebar-nav {
      flex: 1;
      overflow-y: auto;
      padding: 8px;
    }

    .nav-section {
      margin-bottom: 4px;
    }

    .nav-section-toggle {
      display: flex;
      align-items: center;
      gap: 8px;
      width: 100%;
      padding: 8px;
      border: none;
      background: none;
      color: var(--text);
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      cursor: pointer;
      border-radius: 6px;
      text-align: left;
      white-space: nowrap;
    }

    .nav-section-toggle:hover { background: var(--hover); }

    .nav-section-toggle .chevron {
      width: 14px;
      height: 14px;
      transition: transform 0.2s ease;
      flex-shrink: 0;
      color: var(--text-muted);
    }

    .nav-section.collapsed .chevron {
      transform: rotate(-90deg);
    }

    .nav-section.collapsed .nav-items {
      display: none;
    }

    .nav-items {
      padding: 2px 0 4px;
    }

    .nav-item {
      display: flex;
      align-items: center;
      gap: 8px;
      width: 100%;
      padding: 6px 8px 6px 28px;
      border: none;
      background: none;
      color: var(--text-muted);
      font-size: 13px;
      font-weight: 400;
      cursor: pointer;
      border-radius: 6px;
      text-align: left;
      white-space: nowrap;
      text-overflow: ellipsis;
      overflow: hidden;
    }

    .nav-item:hover { background: var(--hover); color: var(--text); }
    .nav-item.active { background: var(--primary-light); color: var(--primary); font-weight: 500; }

    .nav-divider {
      height: 1px;
      background: var(--border);
      margin: 8px;
    }

    .nav-download {
      display: flex;
      align-items: center;
      gap: 8px;
      width: 100%;
      padding: 6px 8px 6px 28px;
      border: none;
      background: none;
      color: var(--text-muted);
      font-size: 13px;
      font-weight: 400;
      cursor: pointer;
      border-radius: 6px;
      text-align: left;
      text-decoration: none;
      white-space: nowrap;
    }

    .nav-download:hover { background: var(--hover); color: var(--text); }

    .nav-download .dl-icon {
      width: 14px;
      height: 14px;
      flex-shrink: 0;
      opacity: 0.5;
    }

    .nav-home {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 12px;
      margin: 8px;
      border-top: 1px solid var(--border);
      color: var(--text-muted);
      font-size: 12px;
      font-weight: 500;
      text-decoration: none;
      border-radius: 6px;
      flex-shrink: 0;
    }
    .nav-home:hover { color: var(--text); background: var(--hover); }
    .nav-home svg { width: 14px; height: 14px; flex-shrink: 0; }

    /* Main content */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
    }

    .topbar {
      height: 44px;
      min-height: 44px;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 0 12px;
      border-bottom: 1px solid var(--border);
      background: var(--bg);
    }

    .toggle-btn {
      width: 32px;
      height: 32px;
      border: none;
      background: none;
      color: var(--text-muted);
      cursor: pointer;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .toggle-btn:hover { background: var(--hover); color: var(--text); }

    .breadcrumb {
      font-size: 13px;
      color: var(--text-muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .breadcrumb strong {
      color: var(--text);
      font-weight: 500;
    }

    .content-frame {
      flex: 1;
      border: none;
      width: 100%;
      background: white;
    }

    @media (prefers-color-scheme: dark) {
      .content-frame {
        background: #0E0E0D;
      }
    }

    /* Welcome screen */
    .welcome {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      padding: 40px;
      text-align: center;
    }

    .welcome img { height: 48px; }
    .welcome .logo-light { display: block; }
    .welcome .logo-dark { display: none; }

    @media (prefers-color-scheme: dark) {
      .welcome .logo-light { display: none; }
      .welcome .logo-dark { display: block; }
    }

    .welcome h2 {
      font-family: 'Poppins', sans-serif;
      font-size: 20px;
      font-weight: 600;
    }
    .welcome p { font-size: 14px; color: var(--text-muted); max-width: 400px; line-height: 1.6; }
  </style>
</head>
<body>

  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <img class="logo-light" src="logos/powerhouse-icon-dark.svg" alt="Powerhouse">
      <img class="logo-dark" src="logos/powerhouse-icon-light.svg" alt="Powerhouse">
      <h1>Powerhouse <span>Design System</span></h1>
    </div>
    <nav class="sidebar-nav">

      <!-- Style Guide -->
      <div class="nav-section">
        <button class="nav-section-toggle" onclick="toggleSection(this)">
          <svg class="chevron" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M5 3l5 5-5 5"/></svg>
          Style Guide
        </button>
        <div class="nav-items">
          <button class="nav-item" onclick="load('styleguide.html', 'Style Guide')">Style Guide</button>
        </div>
      </div>

      <!-- Documents -->
      <div class="nav-section">
        <button class="nav-section-toggle" onclick="toggleSection(this)">
          <svg class="chevron" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M5 3l5 5-5 5"/></svg>
          Documents
        </button>
        <div class="nav-items">
          <button class="nav-item" onclick="load('presentation.html', 'Slide Templates')">Slide Templates</button>
          <button class="nav-item" onclick="load('documents.html', 'Document Templates')">Document Templates</button>
          <div class="nav-divider"></div>
          <a class="nav-download" href="powerhouse-document-templates-light.pdf" download>
            <svg class="dl-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M8 2v8m0 0l-3-3m3 3l3-3M3 12v1.5h10V12"/></svg>
            PDF Export (Light)
          </a>
          <a class="nav-download" href="powerhouse-document-templates-dark.pdf" download>
            <svg class="dl-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M8 2v8m0 0l-3-3m3 3l3-3M3 12v1.5h10V12"/></svg>
            PDF Export (Dark)
          </a>
        </div>
      </div>

      <!-- Illustrations & Illustrated Cards -->
      <div class="nav-section">
        <button class="nav-section-toggle" onclick="toggleSection(this)">
          <svg class="chevron" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M5 3l5 5-5 5"/></svg>
          Illustrations
        </button>
        <div class="nav-items">
          <button class="nav-item" onclick="load('illustrations.html', 'Illustrations &amp; Brand Assets')">Illustrations &amp; Brand Assets</button>
          <button class="nav-item" onclick="load('card-design-guidelines.html', 'Card Design Guidelines')">Card Design Guidelines</button>
          <button class="nav-item" onclick="load('website/powerhouse-io.html', 'Powerhouse.io')">Powerhouse.io</button>
          <button class="nav-item" onclick="load('website-reference.html', 'Powerhouse.io Reference')">Powerhouse.io Screenshots</button>
        </div>
      </div>

    </nav>
    <a class="nav-home" id="nav-home" href="../index.html">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M2.5 6.5L8 2l5.5 4.5V13a1 1 0 01-1 1h-10a1 1 0 01-1-1V6.5z"/></svg>
      All Design Systems
    </a>
  </aside>

  <div class="main">
    <div class="topbar">
      <button class="toggle-btn" onclick="toggleSidebar()" title="Toggle sidebar">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M3 4.5h12M3 9h12M3 13.5h12"/></svg>
      </button>
      <div class="breadcrumb" id="breadcrumb">Select a page from the sidebar</div>
    </div>
    <div class="welcome" id="welcome">
      <img class="logo-light" src="logos/powerhouse-icon-dark.svg" alt="Powerhouse">
      <img class="logo-dark" src="logos/powerhouse-icon-light.svg" alt="Powerhouse">
      <h2>Powerhouse Design System</h2>
      <p>Browse the style guide, presentation templates, document templates, and website page templates. Select a page from the sidebar to get started.</p>
    </div>
    <iframe class="content-frame" id="frame" style="display:none"></iframe>
  </div>

  <script>
    // Hide home link if served from root domain path
    (function() {
      var p = window.location.pathname;
      if (p === '/' || p === '/index.html') {
        var el = document.getElementById('nav-home');
        if (el) el.style.display = 'none';
      }
    })();

    function toggleSidebar() {
      document.getElementById('sidebar').classList.toggle('collapsed');
    }

    function toggleSection(btn) {
      btn.closest('.nav-section').classList.toggle('collapsed');
    }

    function load(src, label) {
      const frame = document.getElementById('frame');
      const welcome = document.getElementById('welcome');
      const breadcrumb = document.getElementById('breadcrumb');

      welcome.style.display = 'none';
      frame.style.display = 'block';
      frame.src = src;
      breadcrumb.innerHTML = '<strong>' + label + '</strong>';

      // Update active state
      document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
      event.currentTarget.classList.add('active');
    }

    // Keyboard shortcut: [ to toggle sidebar
    document.addEventListener('keydown', e => {
      if (e.key === '[' && !e.ctrlKey && !e.metaKey && e.target === document.body) {
        toggleSidebar();
      }
    });
  </script>
</body>
</html>
